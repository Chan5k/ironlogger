<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0e14" />
    <title>IronLog — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0b0e14;
        color: #e2e8f0;
        text-align: center;
      }
      .card {
        max-width: 22rem;
        border-radius: 1rem;
        border: 1px solid rgba(51, 65, 85, 0.55);
        background: rgba(18, 24, 38, 0.95);
        padding: 1.75rem 1.5rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        font-size: 0.875rem;
        line-height: 1.5;
        color: #94a3b8;
      }
      button {
        margin-top: 1.25rem;
        width: 100%;
        border: none;
        border-radius: 0.75rem;
        padding: 0.65rem 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>
        IronLog couldn’t load this page from the network. If you’ve opened the app before, try again — the app may load
        from your device. Workouts you log offline will sync when you’re back online.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
