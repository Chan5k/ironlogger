# Build the Vite client and deploy to GitHub Pages.
#
# Setup:
# 1. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# 2. Repo → Settings → Secrets and variables → Actions → New repository secret:
#      VITE_API_URL  =  https://your-api.example.com   (origin only, no /api)
#    Optional: VITE_VAPID_PUBLIC_KEY (must match API VAPID_PUBLIC_KEY).
# 3. Optional repository variable VITE_BASE_PATH to override auto base (e.g. / or /custom/).
#
# Auto base path: /REPO/ for normal repos; / if repo name ends with .github.io.

name: Deploy client to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Compute default base path
        id: base
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          REPO_DEFAULT_BASE: ${{ steps.base.outputs.path }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -z "$VITE_BASE_PATH" ]; then
            export VITE_BASE_PATH="$REPO_DEFAULT_BASE"
          fi
          echo "Using VITE_BASE_PATH=$VITE_BASE_PATH"
          npm ci
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
